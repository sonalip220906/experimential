<html>
<head>
<title>Deadlines</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    background-color: lavender;
    font-family: Arial, sans-serif;
}


.breadcrumb {
    margin: 10px 20px;
    font-size: 16px;
}

.breadcrumb a {
    text-decoration: none;
    color: #6c63ff;
}

.breadcrumb span {
    color: gray;
}

.container {
    width: 400px;
    margin: auto;
    padding: 20px;
    background-color: white;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: #6c63ff;
}

fieldset {
    border: 2px solid #6c63ff;
    border-radius: 8px;
    margin-bottom: 15px;
    padding: 10px;
    cursor: pointer;
}
fieldset:hover {
    background-color: violet;
    transform: scale(1.05);
    box-shadow: 0 6px 15px;
}

h3 {
    margin: 0;
}


.modal {
    display: none;
    position: fixed;
    z-index: 1;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
}

.modal-content {
    background-color: white;
    margin: 15% auto;
    padding: 20px;
    width: 300px;
    border-radius: 10px;
    text-align: center;
}

.close {
    float: right;
    font-size: 20px;
    cursor: pointer;
}
</style>
</head>

<body>


<div class="breadcrumb">
    <a href="#">Deadlines</a> > <span>Dashboard</span>
</div>

<h1>
<marquee><i class="fa-solid fa-clock"></i> Assessment Deadlines</marquee>
</h1>

<div class="container">
    <fieldset onclick="openModal('30 March')">
        <h3>HTML fundamentals</h3>
    </fieldset>

    <fieldset onclick="openModal('20 April')">
        <h3>CSS styling</h3>
    </fieldset>

    <fieldset onclick="openModal('05 May')">
        <h3>JAVA </h3>
    </fieldset>
</div>


<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <p id="modalText"></p>
    </div>
</div>

<script>
function openModal(text) {
    document.getElementById("modalText").innerText = text;
    document.getElementById("myModal").style.display = "block";
}

function closeModal() {
    document.getElementById("myModal").style.display = "none";
}
</script>

</body>
</html>
