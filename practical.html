<html>
<head>
<style>
body {
    background-color: lavender;
    font-family: Arial, sans-serif;
}

h1 {
    text-align: center;
}


.container-box {
    width: 50%;
    margin: 15px auto;
    padding: 15px;
    border-radius: 12px;
    background: white;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}


fieldset {
    border: 2px solid #6a5acd;
    border-radius: 10px;
    padding: 10px;
}

fieldset:hover{
transform: scale(1.1);
box-shadow: 0 8px 20px;
background-color: violet;
}


legend {
    font-weight: bold;
    color: #6a5acd;
}

select {
    padding: 5px;
    margin-top: 8px;
}
</style>
</head>

<body>

<h1>Practical</h1>

<div class="container-box">
<fieldset>
<legend>HTML</legend>
<label>Select Practical</label>
<select>
<option>Practical 1</option>
<option>Practical 2</option>
<option>Practical 3</option>
</select>
</fieldset>
</div>

<div class="container-box">
<fieldset>
<legend>CSS</legend>
<label>Select Practical</label>
<select>
<option>Practical 1</option>
<option>Practical 2</option>
<option>Practical 3</option>
</select>
</fieldset>
</div>

<div class="container-box">
<fieldset>
<legend>JAVA</legend>
<label>Select Practical</label>
<select>
<option>Practical 1</option>
<option>Practical 2</option>
<option>Practical 3</option>
</select>
</fieldset>
</div>

</body>
</html>
