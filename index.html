<html>
<head>
<title>CodeMaster Academy Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

body{
background: lavender;
}

header{
text-align: center;
font-weight: 900;
font-size: 40px;
font-style: italic;
}

.course-container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.course-card {
  width: 220px;
  background: white;
  border-radius: 12px;
  border: 2px solid blue;
  padding: 20px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.course-card i {
  font-size: 30px;
  margin-bottom: 10px;
}

.course-card h3 {
  margin: 10px 0;
}

progress {
  width: 100%;
  height: 15px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 30px;
}

.box {
  width: 200px;
  background: white;
  padding: 20px;
  border-radius: 12px;
  border: 2px solid blue;
  box-shadow: 2px 2px 10px gray;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.box:hover {
  transform: scale(1.05);
}

.box a {
  text-decoration: none;
  color: black;
  font-weight: bold;
}
</style>
</head>
<body>
<header>CodeMaster Academy<i class="fa-solid fa-graduation-cap"></i></header>
<h1>My Dashboard</h1>
<fieldset>
<legend align ="center"><h2>Enrolled Courses</h2></legend>

<div class="course-container">
<div class="course-card">
<i class="fa-solid fa-book"></i>
<h3>HTML Fundamentals</h3>
<progress value="75" max="100"></progress>
</div>

<div class="course-card">
<i class="fa-solid fa-pen-to-square"></i>
<h3>CSS Styling</h3>
<progress value="40" max="100"></progress>
</div>

<div class="course-card">
<i class="fa-solid fa-chart-column"></i>
<h3>JAVA</h3>
<progress value="85" max="100"></progress>
</div>
</div>
</fieldset>
<br></br>

<div class="container">
 <div class="box">
<h3><a href="practical.html">Practicals</a></h3>
</div>

<div class="box">
<h3><a href="timetable.html">Timetable</a></h3>
</div>

<div class="box">
<h3><a href="deadlines.html">Deadlines</a></h3>
</div>

<div class="box">
<h3><a href="video.html">Video</a></h3>
</div>

<div class="box">
<h3><a href="marks.html">Marks</a></h3>
</div>
</div>


</body>
</html>
