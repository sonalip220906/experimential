.course-container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.course-card {
  width: 220px;
  background: white;
  border-radius: 12px;
  border: 2px solid blue;
  padding: 20px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.course-card i {
  font-size: 30px;
  margin-bottom: 10px;
}

.course-card h3 {
  margin: 10px 0;
}

progress {
  width: 100%;
  height: 15px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 30px;
}

.box {
  width: 200px;
  background: white;
  padding: 20px;
  border-radius: 12px;
  border: 2px solid blue;
  box-shadow: 2px 2px 10px gray;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.box:hover {
  transform: scale(1.05);
}

.box a {
  text-decoration: none;
  color: black;
  font-weight: bold;
}
.box img{
width: 100%;
height: 200px;
object-fit: cover;
border-radius: 10px;
}
</style>
