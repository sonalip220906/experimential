<html>
<title>Video</title>
<head>
<style>
body {
    background: lavender;
    font-family: Arial, sans-serif;
}

h1 {
    text-align: center;
    color: #6c63ff;
}
.container {
    width: 90%;
    margin: auto;
}
.card {
background: white;
border-radius: 12px;
border: 2px solid blue;
padding: 20px;
margin: 20px auto;
width: 420px;
 box-shadow: 0 6px 15px rgba(0,0,0,0.2);
transition: 0.3s;
}
.card:hover {
    transform: scale(1.03);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

video {
    width: 100%;
    max-height: 200px;
    border-radius: 10px;
    margin-bottom: 10px;
}
h2 {
    text-align: center;
    color: #6c63ff;
}

h3 {
    margin: 5px 0;
}

a {
    text-decoration: none;
    color: #6c63ff;
    font-weight: bold;
}

a:hover {
    color: #ff6b81;
}
</style>
</head>
